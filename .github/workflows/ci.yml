name: CI — Verify SkillDock Components

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Merkle Verifier
        run: node src/merkle-verifier.mjs

      - name: Run LLM Guardian
        run: node src/llm-guardian.mjs

      - name: Run Agent Integration Demo
        run: node agent-demo.mjs

      - name: Run Test Suite
        run: node tests/run-tests.mjs
